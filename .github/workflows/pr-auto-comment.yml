name: Auto Comment on PR

on:
  pull_request:
    types: [opened] # 建议只在开启时评论，避免重复刷屏

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    # 显式声明权限，防止 403 错误
    permissions:
      pull-requests: write
    
    steps:
      - name: Add auto comment
        uses: actions/github-script@v7
        with:
          script: |
            const { number, title, user, head, base } = context.payload.pull_request;
            
            const commentBody = `🎉 感谢提交 PR！
            
            - **编号**: #${number}
            - **标题**: ${title}
            - **作者**: @${user.login}
            - **方向**: \`${head.ref}\` → \`${base.ref}\`
            
            🤖 *本评论由 GitHub Actions 自动发出*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: commentBody
            });