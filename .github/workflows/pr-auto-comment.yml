name: Auto Comment on PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-comment:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info
        id: pr_info
        run: |
          echo "PR编号: ${{ github.event.pull_request.number }}"
          echo "PR标题: ${{ github.event.pull_request.title }}"
          echo "作者: ${{ github.event.pull_request.user.login }}"
          echo "分支: ${{ github.event.pull_request.head.ref }} -> ${{ github.event.pull_request.base.ref }}"
          
      - name: Add auto comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 10
            });
            
            const commitCount = commits.data.length;
            const commitList = commits.data.map(c => {
              const msg = c.commit && c.commit.message ? c.commit.message : '无提交信息';
              const firstLine = msg.split('\n')[0];
              return `- ${firstLine}`;
            }).join('\n');
            
            const commentBody = `## 🎉 感谢提交 PR！

**PR 信息：**
- 编号: #${pr.number}
- 标题: ${pr.title}
- 作者: @${pr.user.login}
- 分支: \`${pr.head.ref}\` → \`${pr.base.ref}\`

**提交记录 (${commitCount} 个)：**
${commitList}

---
*🤖 自动评论*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: commentBody
            });