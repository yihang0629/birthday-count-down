name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Get PR Diff
        id: get-diff
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { number } = context.issue;
            const response = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: number,
              mediaType: { format: 'diff' }
            });
            // 提前截断防止 output 超限 (约 50KB)
            return response.data.length > 50000 
              ? response.data.substring(0, 50000) + "\n... (Diff truncated)"
              : response.data;

      - name: Call DeepSeek API
        id: call-ai
        uses: actions/github-script@v7
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PR_DIFF: ${{ steps.get-diff.outputs.result }} # 通过环境变量传递
        with:
          result-encoding: string
          script: |
            const diff = process.env.PR_DIFF;
            const prompt = `你是一位专业的代码审查专家... (此处省略重复的 prompt 内容) ...
            \`\`\`diff
            ${diff}
            \`\`\``;
            
            try {
              const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                  model: 'deepseek-coder',
                  messages: [
                    { role: 'system', content: '你是一位专业的代码审查专家。' },
                    { role: 'user', content: prompt }
                  ],
                  temperature: 0.7
                })
              });
              
              const data = await response.json();
              if (!response.ok) throw new Error(data.error?.message || 'API Error');
              return data.choices[0].message.content;
            } catch (err) {
              core.setFailed(`API Call Failed: ${err.message}`);
            }

      - name: Post Review Comment
        uses: actions/github-script@v7
        env:
          AI_RESULT: ${{ steps.call-ai.outputs.result }}
        with:
          script: |
            const reviewContent = process.env.AI_RESULT;
            if (!reviewContent) return;

            const commentBody = `## 🤖 AI Code Review\n\n${reviewContent}\n\n--- \n*本评论由 AI 自动生成*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });