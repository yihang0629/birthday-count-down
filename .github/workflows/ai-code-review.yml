name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    
    steps:
      - name: Get PR Diff
        id: get-diff
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { number, repo } = context.payload;
            const response = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: number,
              mediaType: {
                format: 'diff'
              }
            });
            return Buffer.from(response.data).toString('utf-8');

      - name: Call DeepSeek API for Code Review
        id: call-ai
        uses: actions/github-script@v7
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        with:
          result-encoding: string
          script: |
            const diff = `${{ steps.get-diff.outputs.result }}`;
            const maxLength = 50000;
            const truncatedDiff = diff.length > maxLength 
              ? diff.substring(0, maxLength) + '\n\n... (内容过长，已截断)' 
              : diff;
            
            const prompt = `你是一位专业的代码审查专家。请对以下 GitHub Pull Request 的代码变更进行审查，并提供有价值的反馈。
            
请从以下角度进行审查：
1. 代码质量：是否有明显的 bug、逻辑错误或代码异味？
2. 安全性：是否有安全漏洞（如 XSS、SQL 注入等）？
3. 性能：是否有性能问题？
4. 代码风格：是否符合最佳实践？
5. 是否有改进建议？

请用中文回复，保持简洁专业。格式如下：
- **总体评价**: [好/一般/需要改进]
- **优点**: [列出代码的优点]
- **问题**: [列出发现的问题，如果有的话]
- **建议**: [改进建议，如果有的话]

以下是 PR 的代码变更：
\`\`\`diff
${truncatedDiff}
\`\`\`
`;
            
            const response = await fetch('https://api.deepseek.com/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${process.env.DEEPSEEK_API_KEY}`
              },
              body: JSON.stringify({
                model: 'deepseek-coder',
                messages: [
                  { role: 'system', content: '你是一位专业的代码审查专家，负责审查代码变更并提供有价值的反馈。' },
                  { role: 'user', content: prompt }
                ],
                temperature: 0.7,
                max_tokens: 4000
              })
            });
            
            if (!response.ok) {
              const error = await response.text();
              throw new Error(`DeepSeek API error: ${response.status} - ${error}`);
            }
            
            const data = await response.json();
            return data.choices[0].message.content;

      - name: Post Review Comment
        uses: actions/github-script@v7
        with:
          script: |
            const reviewContent = `${{ steps.call-ai.outputs.result }}`;
            
            const commentBody = `## 🤖 AI Code Review
            
${reviewContent}
            
---
*本评论由 AI 自动生成，仅供参考*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: commentBody
            });